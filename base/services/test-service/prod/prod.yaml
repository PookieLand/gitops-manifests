apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-service
  namespace: production
  labels:
    app: test-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-service
  template:
    metadata:
      labels:
        app: test-service
    spec:
      containers:
        - name: test-service
          image: nginx:1.25.2
          ports:
            - containerPort: 80
